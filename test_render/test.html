<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 font-mono text-lg space-y-10">
  <div class="whitespace-pre-wrap leading-[2.5] border border-gray-300 w-64">
    <span class="relative inline-block w-0 h-0">
        <span class="absolute left-0 bottom-0 -translate-y-[1.2em] text-blue-500 font-bold text-[0.9em] leading-none whitespace-nowrap">Am</span>
    </span>
    <span>O meu amor </span>
    <span class="relative inline-block w-0 h-0">
        <span class="absolute left-0 bottom-0 -translate-y-[1.2em] text-blue-500 font-bold text-[0.9em] leading-none whitespace-nowrap">G</span>
    </span>
    <span>é muito grande, </span>
    <span class="relative inline-block w-0 h-0">
        <span class="absolute left-0 bottom-0 -translate-y-[1.2em] text-blue-500 font-bold text-[0.9em] leading-none whitespace-nowrap">F</span>
    </span>
    <span>e não cabe num texto pequeno que quebra a linha</span>
  </div>
</body>
</html>
